            style="width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;background:var(--bg);color:var(--text);outline:none;font-family:monospace;text-transform:uppercase"
            oninput="this.value=this.value.replace(/[^a-zA-Z0-9]/g,'').toUpperCase()">
        </div>
        <div style="margin-bottom:14px">
          <div style="font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600">名称（中文标签）</div>
          <input id="new-stitch-label" placeholder="例如：三卷长针" maxlength="16"
            style="width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;background:var(--bg);color:var(--text);outline:none;font-family:inherit">
        </div>
        <div style="margin-bottom:14px">
          <div style="font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600">颜色</div>
          <div style="display:flex;align-items:center;gap:8px">
            <input type="color" id="new-stitch-color" value="#7DD3FC"
              style="width:38px;height:38px;border:none;border-radius:8px;cursor:pointer;background:none;padding:0">
            <span style="font-size:12px;color:var(--muted);font-family:monospace" id="new-color-hex">#7DD3FC</span>
          </div>
        </div>
        <div style="margin-bottom:8px">
          <div style="font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600">分类</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${[{v:'basic',l:'基础'},{v:'increase',l:'加针'},{v:'decrease',l:'减针'},{v:'special',l:'特殊'}].map(c =>
              `<label style="font-size:12px;color:var(--text);display:flex;align-items:center;gap:3px;cursor:pointer;padding:4px 8px;border:1px solid var(--border);border-radius:8px">
                <input type="radio" name="new-stitch-cat" value="${c.v}" ${c.v==='basic'?'checked':''}> ${c.l}
              </label>`
            ).join('')}
          </div>
        </div>
      </div>
      <div style="padding:10px 16px;display:flex;gap:8px">
        <button class="bar-btn" style="flex:1" onclick="backToSetupGrid()">← 返回</button>
        <button class="bar-btn primary" style="flex:2" onclick="saveNewStitch()">✓ 创建</button>
      </div>`;

      showSheet(html);

      const colorInput = document.getElementById('new-stitch-color');
      const hexDisplay = document.getElementById('new-color-hex');
      if (colorInput && hexDisplay) {
        colorInput.addEventListener('input', () => { hexDisplay.textContent = colorInput.value; });
      }
    }

    function saveNewStitch() {
      const proj = getProj(state.curProjId);
      if (!proj) return;

      const idInput = document.getElementById('new-stitch-id');
      const labelInput = document.getElementById('new-stitch-label');
      const colorInput = document.getElementById('new-stitch-color');
      const catRadio = document.querySelector('input[name="new-stitch-cat"]:checked');

      const sid = idInput?.value?.trim().toUpperCase();
      if (!sid) { alert('请输入缩写 ID'); return; }
      if (STITCH_LIB[sid]) { alert('该 ID 与预设针法冲突，请换一个'); return; }
      if (proj.customSettings.customStitches[sid]) { alert('该 ID 已存在'); return; }

      const label = labelInput?.value?.trim() || sid;
      const color = colorInput?.value || '#7DD3FC';
      const category = catRadio?.value || 'basic';

      if (!proj.customSettings.customStitches) proj.customSettings.customStitches = {};
      proj.customSettings.customStitches[sid] = { id: sid, label, color, category };

      saveData();
      backToSetupGrid();
    }

    function deleteCustomStitch(sid) {
      const proj = getProj(state.curProjId);
      if (!proj) return;
      showConfirmDialog(`确定要删除自定义针法「${resolveLabel(sid, proj)}」吗？`, (ok) => {
        if (!ok) return;

        delete proj.customSettings.customStitches[sid];
        delete proj.customSettings.names[sid];
        delete proj.customSettings.colors[sid];

        // 从所有 part 的 customPalette 中移除
        proj.parts.forEach(part => {
          if (part.customPalette) {
            part.customPalette = part.customPalette.filter(id => id !== sid);
          }
        });

        saveData();
        backToSetupGrid();
      });
    }

    function saveProjectStitches(mode) {
      const proj = getProj(state.curProjId);
      if (!proj) return;
      const part = getActivePart(proj);
      if (!part) return;

      // 收集用户手动勾选的针法（包含预设 + 自定义）
      const allIds = [...Object.keys(STITCH_LIB), ...Object.keys(proj.customSettings?.customStitches || {})];
      const manualIds = allIds.filter(sid => {
        const btn = document.getElementById(`setup-btn-${sid}`);
        return btn && btn.dataset.checked === 'true';
      });

      // 合并图解中解析出的针法
      const planned = new Set(manualIds);
      part.rounds.forEach(r => {
        if (r.instruction) extractStitches(r.instruction).forEach(sid => planned.add(sid));
      });

      part.customPalette = Array.from(planned);
      saveData();
      if (mode === 'create') state.flowState.newProjectFlow = false;
      state.flowState.setupMode = null;
      closeSheet();

      if (mode === 'create') {
        renderProject();
      } else {
        // DOM 直接更新底部 palette，不刷新整个页面（保留圈数展开状态、选中状态等）
        const bar = document.getElementById('bottom-bar');
        const paletteHtml = renderDynamicPalette(proj);
        const toggleHtml = renderFilterToggle();
        const barRowHtml = renderBarRow();
        bar.innerHTML = paletteHtml + toggleHtml + barRowHtml;
        updateVoiceButton();
      }
    }

    function closeSetupSheet() {
      const mode = state.flowState.setupMode;
      state.flowState.newProjectFlow = false;
      state.flowState.setupMode = null;
      closeSheet();
      // 新建项目时取消：无配置则保留默认完整针法库，仍需渲染项目
      if (mode === 'create') {
        renderProject();
      }
    }

    // ═══════════════════════════════════════════
    //  圈数删除
    // ═══════════════════════════════════════════

    function deleteRound(roundId) {
      const proj = getProj(state.curProjId);
      if (!proj) return;

      let ownerPart = null;
      for (const p of proj.parts) {
        if (p.rounds.find(r => r.id === roundId)) { ownerPart = p; break; }
      }
      if (!ownerPart) return;

      const unit = getUnitLabel(proj);
      showConfirmDialog(`确定要删除这一${unit}吗？`, (ok) => {
        if (!ok) return;

        const idx = ownerPart.rounds.findIndex(r => r.id === roundId);
        if (idx === -1) return;

        // ── 删除前保存快照 ──
        state._lastDeletedRound = {
          round: JSON.parse(JSON.stringify(ownerPart.rounds[idx])),
          partId: ownerPart.id,
          index: idx,
          prevActiveRoundId: ownerPart.activeRoundId
        };

        ownerPart.rounds.splice(idx, 1);

        if (ownerPart.activeRoundId === roundId) {
          const last = ownerPart.rounds[ownerPart.rounds.length - 1];
          ownerPart.activeRoundId = last ? last.id : null;
        }

        if (ownerPart.rounds.length === 0) {
          const r = { id: uid(), seq: [], instruction: "", isTextCard: false };
          ownerPart.rounds.push(r);
          ownerPart.activeRoundId = r.id;
          // 补底圈时清空快照，因为无法有意义地恢复到空项目
          state._lastDeletedRound = null;
        }

        normalizeRoundNums(ownerPart.rounds);
        saveData();
        renderProject();

        // ── 删除后显示可撤销 toast ──
        if (state._lastDeletedRound) {
          showToast(`已删除一${unit}`, {
            label: '撤销',
            onClick: undoDeleteRound
          }, 5000);
        }
      });
    }

    function undoDeleteRound() {
      if (!state._lastDeletedRound) return;
      const { round, partId, index, prevActiveRoundId } = state._lastDeletedRound;
      state._lastDeletedRound = null;

      const proj = getProj(state.curProjId);
      if (!proj) return;

      const part = proj.parts.find(p => p.id === partId);
      if (!part) return;

      // 恢复圈到原位置
      part.rounds.splice(index, 0, round);

      // 恢复活跃圈（如果原活跃圈是被删除的那圈，也一并恢复）
      part.activeRoundId = prevActiveRoundId;

      normalizeRoundNums(part.rounds);
      saveData();
      renderProject();

      showToast('已恢复');
    }

    // ── render home ──
    function renderHome() {
      try {
        document.getElementById("hdr-back").style.display = "none";
        document.getElementById("hdr-title").innerHTML = "<span>🧶 钩织计数本</span>";
        document.getElementById("hdr-sub").textContent = "";
        document.getElementById("hdr-pdf").style.display = "none";
        document.getElementById("hdr-settings").style.display = "none";

        const totalProjs = state.data.projects.length;
        const totalNeedles = state.data.projects.reduce((sum, p) =>
          sum + (p.parts || []).reduce((s, pt) =>
            s + (pt.rounds || []).reduce((ss, r) => ss + (r.seq?.length || 0), 0), 0), 0);

        let html = `<div class="home-top">
    <div class="home-heading">我的项目</div>
    <div style="font-size:12px;color:var(--muted)">${totalProjs} 个项目 · 累计 ${totalNeedles} 针</div>
  </div>`;

        const activeProjs = state.data.projects.filter(p => !p.archived);
        const archivedProjs = state.data.projects.filter(p => p.archived);

        html += `<div class="proj-list">`;
        if (activeProjs.length === 0 && archivedProjs.length === 0) {
          html += `<div style="text-align:center;color:var(--muted);font-size:14px;padding:40px 16px">还没有项目，点击下方创建第一个 🌸</div>`;
        }
        activeProjs.forEach(p => {

          const allNeedles = (p.parts || []).reduce((s, pt) => s + (pt.rounds || []).reduce((ss, r) => ss + (r.seq?.length || 0), 0), 0);
          const coverHtml = p.coverImage

          html += `<div class="proj-card" onclick="openProject('${p.id}')">
    ${coverHtml}
    <div class="proj-info">
      <div class="proj-name">${esc(p.name)}</div>
      <div class="proj-meta">${(p.parts||[]).length} 部件 · ${allRounds} ${unit} · ${allNeedles} 针</div>
    </div>
    <button class="proj-del" onclick="toggleProjMenu('${p.id}',event)" style="position:relative">⋯</button>
    <div class="proj-menu${state.flowState.projMenuId === p.id ? ' show' : ''}" id="proj-menu-${p.id}">
      <button class="proj-menu-item" onclick="event.stopPropagation();pickCover('${p.id}')">🖼 设置封面</button>
      ${removeCoverBtn}
      <button class="proj-menu-item" onclick="event.stopPropagation();archiveProject('${p.id}')">📦 归档</button>
      <button class="proj-menu-item danger" onclick="event.stopPropagation();deleteProject('${p.id}',event)">🗑 删除</button>
    </div>
  </div>`;
        });
        html += `</div>`;

        // 已归档项目
        if (archivedProjs.length > 0) {
          html += `<div style="padding:16px 12px 4px">
      <div class="home-heading" style="margin-bottom:8px;opacity:.7">📦 已归档 (${archivedProjs.length})</div>
    </div>`;
          html += `<div class="proj-list">`;
          archivedProjs.forEach(p => {
            const allRounds = (p.parts || []).reduce((s, pt) => s + (pt.rounds?.length || 0), 0);
            const allNeedles = (p.parts || []).reduce((s, pt) => s + (pt.rounds || []).reduce((ss, r) => ss + (r.seq?.length || 0), 0), 0);
            const coverHtmlArc = p.coverImage
              ? `<img class="proj-cover-img" src="${p.coverImage}" onclick="event.stopPropagation();pickCover('${p.id}')" title="点击更换封面">`
              : `<div class="proj-icon">📦</div>`;
            const removeCoverBtnArc = p.coverImage

            html += `<div class="proj-card archived" onclick="openProject('${p.id}')">

      <div class="proj-info">

        <div class="proj-meta">${(p.parts||[]).length} 部件 · ${allRounds} ${unitArc} · ${allNeedles} 针</div>
      </div>
      <button class="proj-del" onclick="toggleProjMenu('${p.id}',event)">⋯</button>
      <div class="proj-menu${state.flowState.projMenuId === p.id ? ' show' : ''}" id="proj-menu-${p.id}">

    // ── render project ──
    function renderProject() {
      // 编辑模式下禁止 DOM 重构，避免打断输入焦点
      if (window.editingPartId !== null) return;

      // 恢复在 blur 之前捕获的编辑状态
      window.editingPartId = state.flowState.captureEdit || window.editingPartId;
      state.flowState.captureEdit = null;

      const proj = getProj(state.curProjId);
      if (!proj) return goHome();
      const part = getActivePart(proj);

      document.getElementById("hdr-back").style.display = "flex";
      document.getElementById("hdr-settings").style.display = "none";
      document.getElementById("tab-nav").style.display = "none";
      document.getElementById("hdr-title").innerHTML =
        `<span id="proj-name-edit" contenteditable="true" onblur="renameProject(this.textContent.trim())"
    style="outline:none;min-width:40px;display:inline-block" title="点击编辑名称">${esc(proj.name)}</span>
    <span onclick="document.getElementById('proj-name-edit').focus()" style="font-size:12px;color:var(--accent);cursor:pointer;margin-left:3px;opacity:.7" title="点击编辑项目名">✎</span>`;

      // 全项目统计
      const allRounds = (proj.parts || []).reduce((s, pt) => s + (pt.rounds?.length || 0), 0);
      const allNeedles = (proj.parts || []).reduce((s, pt) => s + (pt.rounds || []).reduce((ss, r) => ss + (r.seq?.length || 0), 0), 0);
      const unit = getUnitLabel(proj);
      document.getElementById("hdr-sub").textContent = `${(proj.parts||[]).length} 部件 · ${allRounds} ${unit} · ${allNeedles} 针`;

      // 活跃圈 id：以 activeRoundId 为准，找不到则 fallback 到最后一圈
      const activeRid = part && part.rounds.length ? (part.rounds.find(r => r.id === part.activeRoundId)?.id || part.rounds[part.rounds.length - 1].id) : null;

      let html = "";

      // 圈/行切换
      html += `<div style="display:flex;justify-content:flex-end;padding:4px 16px 0">
        <span style="font-size:10px;color:var(--muted);cursor:pointer;border:1px solid var(--border);border-radius:10px;padding:2px 8px;background:var(--card)" onclick="toggleRowTerms()">显示：${unit} ▾</span>

      // ── 部件选项卡 ──
      html += `<div class="part-tabs-wrap" id="part-tabs-wrap">
      <div class="part-tabs-scroll" onmousedown="state.flowState.captureEdit=getEditingPartId()">`;
      (proj.parts || []).forEach(pt => {
        const isActive = pt.id === (part?.id || proj.activePartId);
        const isEditing = pt.id === window.editingPartId;
        html += `<button class="part-tab${isActive ? " active" : ""}"
      onclick="switchPart('${pt.id}')"

      <span class="part-name-text" style="${isEditing ? 'display:none' : ''}">${esc(pt.title)}</span>
      <input class="part-name-input" value="${esc(pt.title)}"
        style="${isEditing ? '' : 'display:none'}"
        onclick="event.stopPropagation()"
        onfocus="this.setSelectionRange(this.value.length, this.value.length)"

        onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">
      <span class="part-tab-edit-icon" onclick="handleEditBtnClick(event, '${pt.id}', this)" style="font-size:11px;cursor:pointer;opacity:.6;margin-left:2px" title="${isEditing ? '完成编辑' : '编辑名称'}">${isEditing ? '✔' : '✎'}</span>
      ${(proj.parts||[]).length > 1 ? `<span class="part-tab-del" onclick="handleDeleteBtnClick(event, '${pt.id}')" title="删除部件">×</span>` : ''}
    </button>`;
      });
      html += `<button class="part-tab part-tab-add" onclick="addPart()" title="新增部件">＋</button>
      </div></div>`;

      html += renderTaskSlide(proj);

      html += `<div class="rounds-wrap">`;
      if (part) part.rounds.forEach((r, i) => {
        const isActive = r.id === activeRid;
        const exp = state.expandedRounds.has(r.id) || isActive;
        const total = r.seq.length;
        const dots = r.seq.slice(-8).map(sid => `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${getProjColor(sid, proj)};margin-right:2px"></span>`).join("");

        html += `<div class="round-card" id="round-${r.id}">
    <div class="round-hdr" onclick="toggleRound('${r.id}')">
      <div class="round-badge${isActive ? " active" : ""}" onclick="event.stopPropagation();setActiveRound(null,'${r.id}')" style="cursor:pointer" title="点击设为当前${unit}">${r.isTextCard ? "文" : (r.roundNum === 0 ? "起" : (r.roundNum != null ? r.roundNum : i + 1))}</div>
      <div class="round-info">
        <div class="round-label">${r.isTextCard ? (r.instruction || "备注") : (r.roundNum === 0 ? "起针" : `第 ${r.roundNum != null ? r.roundNum : i + 1} ${unit}`)}${isActive ? " <span style='font-size:10px;background:var(--accent);color:#fff;border-radius:4px;padding:1px 5px;margin-left:4px'>编辑中</span>" : ""}</div>
        <div class="round-count">${total} 针 ${dots}</div>
      </div>
      <button class="round-del" onclick="event.stopPropagation();deleteRound('${r.id}')" title="删除这一${unit}">×</button>
      <span class="round-chev${exp ? " open" : ""}">›</span>
    </div>
    <div class="round-body${exp ? " open" : ""}">`;

        html += `<div class="seq-wrap">`;
        if (r.seq.length === 0) {
          html += `<span class="seq-empty">暂无记录，点击下方针法按钮添加</span>`;
        } else {
          r.seq.forEach((sid, idx) => {
            html += renderSpillHTML(sid, idx, r, proj);
          });
        }
        html += `</div>`;
        html += `</div></div>`;
      });

      html += `</div>`;
      document.getElementById("screen").innerHTML = html;

      const bar = document.getElementById("bottom-bar");
      bar.style.display = "block";
      let bhtml = renderDynamicPalette(proj);
      bhtml += renderFilterToggle();
      bhtml += renderBarRow();
      bar.innerHTML = bhtml;
      const barH = document.getElementById('bottom-bar').offsetHeight;
      document.documentElement.style.setProperty('--bottom-bar-h', barH + 'px');
      updateVoiceButton();
    }

    function addPart() {
      const proj = getProj(state.curProjId);
      if (!proj) return;
      const prevPart = getActivePart(proj);
      const r = { id: uid(), roundNum: 0, instruction: '', seq: [], isTextCard: false };
      const part = {
        id: uid(),
        title: `部件 ${(proj.parts || []).length + 1}`,
        rawPattern: '',
        rounds: [r],
        activeRoundId: r.id,
        customPalette: prevPart?.customPalette ? [...prevPart.customPalette] : null
      };
      proj.parts = proj.parts || [];
      proj.parts.push(part);
      proj.activePartId = part.id;
      saveData();
      renderProject();
    }

    function switchPart(partId) {
      const proj = getProj(state.curProjId);
      if (!proj) return;
      if (window.editingPartId !== null && window.editingPartId !== partId) {
        window.editingPartId = null;
      }
      proj.activePartId = partId;
      saveData();
      renderProject();
    }

    function handleEditBtnClick(event, partId, el) {
      event.preventDefault();
      event.stopPropagation();
      if (window.editingPartId === partId) {
        el.previousElementSibling.blur();
      } else {
        startEditPartName(el, partId);
      }
    }
    function handleDeleteBtnClick(event, partId) {
      event.preventDefault();
      event.stopPropagation();
      deletePart(partId);
    }

    function startEditPartName(icon, partId) {
      console.log('Action Triggered: startEditPartName', partId);
      window.editingPartId = partId;
      const input = icon.previousElementSibling;
      const span = input.previousElementSibling;
      span.style.display = 'none';
      input.style.display = '';
      input.focus();
      // 编辑模式下禁止调用 renderProject，避免 DOM 重构丢失焦点
    }
    function partNameBlur(input, partId) {
      console.log('Action Triggered: partNameBlur', partId, input.value.trim());
      renamePart(partId, input.value.trim());
      window.editingPartId = null;
      renderProject();
    }
    function renamePart(partId, name) {
      if (!name || !state.curProjId) return;
      const proj = getProj(state.curProjId);
      if (!proj) return;
      const pt = (proj.parts || []).find(p => p.id === partId);
      if (pt) { pt.title = name; saveData(); }
    }

    function deletePart(partId) {
      console.log('Action Triggered: deletePart', partId);
      const proj = getProj(state.curProjId);
      if (!proj) return;
      if (!proj.parts || proj.parts.length <= 1) return;
      showConfirmDialog("确定删除这个部件及其中所有记录？此操作不可撤销。", (ok) => {
        if (!ok) return;
        proj.parts = proj.parts.filter(pt => pt.id !== partId);
        if (proj.activePartId === partId) proj.activePartId = proj.parts[0].id;
        saveData();
        renderProject();
      });
    }

    function renameProject(name) {
      if (!name || !state.curProjId) return;
      const proj = getProj(state.curProjId);
      if (proj) { proj.name = name; saveData(); }
    }

/**
     * 压缩图片：最长边压缩到 maxSize px，输出 jpeg base64
     * @param {File} file
     * @param {number} [maxSize=300]
     * @returns {Promise<string>}
     */
    function compressImage(file, maxSize = 300) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(url);
          let { width, height } = img;
          const scale = Math.min(maxSize / width, maxSize / height, 1);
          width = Math.round(width * scale);
          height = Math.round(height * scale);

          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.8));
        };
        img.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error('图片加载失败'));
        };
        img.src = url;
      });
    }

    function setProjectCover(projectId, input) {
      const file = input.files?.[0];
      if (!file) return;
      compressImage(file).then(dataUrl => {
        const proj = getProj(projectId);
        if (!proj) return;
        proj.coverImage = dataUrl;
        saveData();
        renderHome();
        showToast('封面已更新');
      }).catch(() => showToast('图片处理失败'));
      input.value = '';
    }

    function removeProjectCover(projectId) {
      const proj = getProj(projectId);
      if (!proj) return;
      proj.coverImage = null;
      saveData();
      renderHome();
      showToast('封面已移除');
    }

    function pickCover(projectId) {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = () => setProjectCover(projectId, input);
      input.click();
    }
    // ═══════════════════════════════════════════
    //  Voice feedback (edge glow)
    // ═══════════════════════════════════════════
    function triggerEdgeGlow(sid) {
      const color = sid ? getProjColor(sid, getProj(state.curProjId)) : '#9E8A74';
      const el = document.getElementById('edge-glow');
      if (!el) return;

      el.style.boxShadow = `inset 0 0 0 10px ${color}`;
      el.style.opacity = '1';

      clearTimeout(state.flowState.glowTimer);
      state.flowState.glowTimer = setTimeout(() => {
        el.style.transition = 'opacity 0.35s ease-out';
        el.style.opacity = '0';
        setTimeout(() => {
          el.style.transition = 'opacity 0.08s ease-in';
        }, 400);
      }, 120);
    }

    // ═══════════════════════════════════════════
    //  暴露全局函数（供 HTML onclick 使用）
    // ═══════════════════════════════════════════
    const _globals = {
      goHome, openProject, exportPDF, exportData, exportSingleProject, importData,
      showNewProjectDialog, showConfirmDialog, confirmDialog, closeDialog, deleteProject,
      renderProject,
      addRound, toggleRound, deleteRound, undoDeleteRound, setActiveRound,
      pushStitch, undoStitch, stitchTap,
      changeStitch, deleteStitch, startInsert, doInsert,
      closeSheet, openPatternPasteSheet,
      handleParsePattern, handleOCR, removeParsedItem, confirmImport, updateCurrentPart, addNewPart,
      showLoading, hideLoading, loadTesseract,
      startImportFlow, startManualFlow, dismissEntryChoice,
      toggleSelectAllInSetup, startImportFromSetup, cancelPasteSheet,
      normalizeRoundNums,
      renameProject,
      openStitchSetup, toggleSetupStitch, saveProjectStitches, closeSetupSheet,
      showEntryChoiceSheet,
      toggleFilterByRound, toggleRowTerms, getUnitLabel,
      openStitchCustomize, saveStitchCustomize, resetStitchCustomize, backToSetupGrid,
      openNewStitchForm, saveNewStitch, deleteCustomStitch,
      addPart, switchPart, renamePart, deletePart,
      startEditPartName, partNameBlur, getEditingPartId, handleEditBtnClick, handleDeleteBtnClick,
      toggleProjMenu, archiveProject, showArchiveSuccessSheet, handlePwaHintOptOut, showPwaTutorial, unarchiveProject,
      toggleVoiceMode, updateVoiceButton, setVoicePulse, playSound,
      renderDynamicPalette, renderFilterToggle, renderBarRow, triggerEdgeGlow,
      openSettings, changeTheme, toggleVoiceDefault, clearAllData,
      switchTab, renderSettings, updateTabNav,
      editExpectedCount,
      pickCover, setProjectCover, removeProjectCover
    };
    Object.entries(_globals).forEach(([k, v]) => { window[k] = v; });

    // 点击空白处关闭项目菜单
    document.addEventListener('click', (e) => {
      if (state.flowState.projMenuId === null) return;
      const menu = document.getElementById(`proj-menu-${state.flowState.projMenuId}`);
      if (menu && menu.contains(e.target)) return;
      if (e.target.closest('.proj-del')) return;
      state.flowState.projMenuId = null;
      if (menu) menu.classList.remove('show');
    });

    document.getElementById("tab-nav").style.display = "flex";
    loadData();
    renderHome();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then((reg) => {
        // 检测新版本并提示刷新
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              console.log('[SW] 新版本已安装，请刷新页面');
              if (window.showToast) {
                showToast('新版本已就绪，刷新后生效', { label: '刷新', onClick: () => location.reload() }, 8000);
              }
            }
          });
        });
      }).catch((err) => {
        console.warn('SW 注册失败:', err);
      });
    }
  </script>
