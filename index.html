    // ── Tesseract.js 懒加载 ──
    let _tesseractLoaded = false;
    let _tesseractLoading = false;

    function showLoading(text) {
      const mask = document.getElementById('loading-mask');
      const txt = document.getElementById('loading-text');
      if (txt) txt.textContent = text || '正在加载...';
      if (mask) mask.classList.add('show');
    }
    function hideLoading() {
      const mask = document.getElementById('loading-mask');
      if (mask) mask.classList.remove('show');
    }

    function loadTesseract() {
      return new Promise((resolve, reject) => {
        if (_tesseractLoaded) return resolve();
        if (_tesseractLoading) {
          const check = () => {
            if (_tesseractLoaded) resolve();
            else if (!_tesseractLoading) reject(new Error('Tesseract 加载失败'));
            else setTimeout(check, 100);
          };
          check();
          return;
        }
        _tesseractLoading = true;
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
        script.onload = () => { _tesseractLoaded = true; _tesseractLoading = false; resolve(); };
        script.onerror = () => { _tesseractLoading = false; reject(new Error('Tesseract 脚本加载失败')); };
        document.head.appendChild(script);
      });
    }

    async function handleOCR(input) {
      const file = input.files[0];
      if (!file) return;
      const status = document.getElementById('ocr-status');
      const textarea = document.getElementById('pattern-input');
      if (status) {
        status.style.display = 'block';
        status.style.color = 'var(--muted)';
        status.textContent = '⏳ 正在初始化识别引擎...';
      }

      try {
        showLoading('正在加载识别引擎...');
        await loadTesseract();
        hideLoading();

        if (status) status.textContent = '⏳ 识别中... 0%';

        const result = await Tesseract.recognize(file, 'chi_sim+eng', {
          logger: m => {
            if (m.status === 'recognizing text' && status) {
              status.textContent = `⏳ 识别中... ${(m.progress * 100).toFixed(0)}%`;
            }
          }
        });
        const text = result.data.text;
        if (textarea) textarea.value = text;
        if (status) {
          status.textContent = '✅ 识别完成，请检查修正后点击解析';
          status.style.color = 'var(--accent)';
        }
      } catch (err) {
        hideLoading();
        console.error('OCR 失败:', err);
        if (status) {
          status.textContent = '❌ 识别失败，请手动输入';
          status.style.color = '#E07070';
        }
      }
    }

    function openParseConfirmSheet(parsed) {
      const roundCount = parsed.filter(p => p.type === 'round').length;
      const textCount = parsed.filter(p => p.type === 'text').length;

      let html = `<div class="sheet-handle"></div>
  <div class="sheet-title">✅ 校验图解（${roundCount} 圈 · ${textCount} 条备注）</div>
  <div style="max-height:50vh;overflow-y:auto;padding:0 4px">`;

      parsed.forEach((item, idx) => {
        const badge = item.type === 'round'
          ? `<span style="display:inline-block;background:var(--accent);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;margin-right:6px;flex-shrink:0">第${item.roundNum}圈</span>`
          : `<span style="display:inline-block;background:var(--border);color:var(--muted);font-size:10px;padding:2px 6px;border-radius:4px;margin-right:6px;flex-shrink:0">备注</span>`;

        html += `<div class="sheet-item" style="padding:10px 16px;align-items:flex-start">

          style="width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:13px;background:var(--bg);color:var(--text);outline:none;font-family:inherit"
          onchange="flowState.pendingParsed[${idx}].instruction=this.value.trim()">
        ${item.seq.length ? `<div style="font-size:11px;color:var(--muted);margin-top:3px">检测到针法：${item.seq.join(' · ')}</div>` : ''}
      </div>
      <button onclick="removeParsedItem(${idx})" style="background:none;border:none;color:#D0B0A0;font-size:20px;padding:4px 8px;cursor:pointer;line-height:1;margin-top:20px">×</button>
    </div>`;
      });

      html += `</div>`;
      html += `<div style="padding:10px 16px;display:flex;gap:8px">
    <button class="bar-btn" style="flex:1" onclick="confirmImport('overwrite')">覆盖当前部件</button>
    <button class="bar-btn primary" style="flex:2" onclick="confirmImport('newPart')">作为新部件导入</button>
  </div>`;
      html += `<button class="sheet-cancel" onclick="openPatternPasteSheet()">← 返回修改</button>`;

      showSheet(html);
    }

    function removeParsedItem(idx) {
      if (!flowState.pendingParsed) return;
      flowState.pendingParsed.splice(idx, 1);
      if (flowState.pendingParsed.length === 0) {
        closeSheet();
        flowState.pendingParsed = null;
        return;
      }
      openParseConfirmSheet(flowState.pendingParsed);
    }

    function confirmImport(mode) {
      const parsed = flowState.pendingParsed;
      if (!parsed || parsed.length === 0) {
        closeSheet();
        return;
      }

      const proj = getProj(curProjId);
      if (!proj) return;

      let targetPart;
      if (mode === 'newPart') {
        // 创建新部件
        const partId = uid();
        targetPart = { id: partId, title: '部件 ' + (proj.parts.length + 1), rawPattern: '', rounds: [], activeRoundId: null, customPalette: null };
        proj.parts.push(targetPart);
        proj.activePartId = partId;
      } else {
        // 覆盖当前部件
        targetPart = getActivePart(proj);
        if (!targetPart) return;
        // 清理默认空圈
        if (targetPart.rounds.length === 1) {
          const only = targetPart.rounds[0];
          if (only.seq.length === 0 && !only.instruction && !only.isTextCard) {
            targetPart.rounds.pop();
          }
        }
      }

      // 追加解析结果到目标 part
      parsed.forEach((item, idx) => {
        const input = document.getElementById(`edit-${idx}`);
        const instruction = input ? input.value.trim() : item.instruction;
        targetPart.rounds.push({
          id: uid(),
          seq: [],
          instruction,
          isTextCard: item.type === 'text',
          roundNum: item.roundNum
        });
      });

      // 将最后一圈设为活跃圈
      const lastRound = targetPart.rounds[targetPart.rounds.length - 1];
      targetPart.activeRoundId = lastRound.id;
      expandedRounds.add(lastRound.id);

      // 自动配置 customPalette 为解析识别出的针法
      if (flowState.importMode === 'create' || mode === 'newPart' || !targetPart.customPalette || targetPart.customPalette.length === 0) {
        const detectedIds = new Set();
        parsed.forEach(item => {
          if (item.seq) item.seq.forEach(sid => detectedIds.add(sid));
        });
        if (detectedIds.size > 0) {
          targetPart.customPalette = Array.from(detectedIds);
        }
      }
      flowState.importMode = null;
      flowState.newProjectFlow = false;

      normalizeRoundNums(targetPart.rounds);

      flowState.pendingParsed = null;
      saveData();
      closeSheet();
      renderProject();
      setTimeout(() => {
        const el = document.getElementById('round-' + lastRound.id);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 60);
    }

    // ── render home ──
    function renderHome() {
      try {
        document.getElementById("hdr-back").style.display = "none";
        document.getElementById("hdr-title").innerHTML = "<span>🧶 钩织计数本</span>";
        document.getElementById("hdr-sub").textContent = "";

        const totalProjs = data.projects.length;

          sum + (p.parts || []).reduce((s, pt) =>
            s + (pt.rounds || []).reduce((ss, r) => ss + (r.seq?.length || 0), 0), 0), 0);

        let html = `<div class="home-top">
    <div class="home-heading">我的项目</div>
    <div style="font-size:12px;color:var(--muted)">${totalProjs} 个项目 · 累计 ${totalNeedles} 针</div>
  </div>`;

        const activeProjs = data.projects.filter(p => !p.archived);
        const archivedProjs = data.projects.filter(p => p.archived);

        html += `<div class="proj-list">`;
        if (activeProjs.length === 0 && archivedProjs.length === 0) {

        }

/**
     * 压缩图片：最长边压缩到 maxSize px，输出 jpeg base64
     * @param {File} file
     * @param {number} [maxSize=300]
     * @returns {Promise<string>}
     */
    function compressImage(file, maxSize = 300) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(url);
          let { width, height } = img;
          const scale = Math.min(maxSize / width, maxSize / height, 1);
          width = Math.round(width * scale);
          height = Math.round(height * scale);

          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.8));
        };
        img.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error('图片加载失败'));
        };
        img.src = url;
      });
    }

/**
     * 显示底部 toast，支持一个可选操作按钮
     * @param {string} message
     * @param {{ label: string, onClick: function }} [action]
     * @param {number} [duration=4000]
     */
    function showToast(message, action, duration = 4000) {
      const existing = document.getElementById('app-toast');
      if (existing) existing.remove();

      const toast = document.createElement('div');
      toast.id = 'app-toast';
      toast.style.cssText = `
        position: fixed;
        bottom: 90px;
        left: 50%;
        transform: translateX(-50%);
        background: #2D1E10;
        color: #fff;
        padding: 10px 16px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 12px;
        z-index: 9999;
        box-shadow: 0 4px 16px rgba(0,0,0,.25);
        max-width: 320px;
        animation: toast-in .2s ease;
      `;

      const style = document.createElement('style');
      style.textContent = `@keyframes toast-in { from { opacity:0; transform:translateX(-50%) translateY(8px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }`;
      document.head.appendChild(style);

      toast.textContent = message;

      if (action) {
        const btn = document.createElement('button');
        btn.textContent = action.label;
        btn.style.cssText = `
          background: var(--accent);
          border: none;
          border-radius: 6px;
          color: #fff;
          font-size: 12px;
          font-weight: 700;
          padding: 4px 10px;
          cursor: pointer;
          white-space: nowrap;
          font-family: inherit;
        `;
        btn.onclick = () => { toast.remove(); action.onClick(); };
        toast.appendChild(btn);
      }

      document.body.appendChild(toast);
      setTimeout(() => {
        if (document.getElementById('app-toast') === toast) {
          toast.style.transition = 'opacity .3s';
          toast.style.opacity = '0';
          setTimeout(() => toast.remove(), 300);
        }
      }, duration);
    }

    function playSound(type) {
      try {
        const ctx = _getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';

        const now = ctx.currentTime;
        const dur = 0.18;
        const vol = 0.25;

        if (type === 'enter') {
          osc.frequency.setValueAtTime(440, now);
          osc.frequency.linearRampToValueAtTime(880, now + dur);
        } else {
          osc.frequency.setValueAtTime(880, now);
          osc.frequency.linearRampToValueAtTime(440, now + dur);
        }

        gain.gain.setValueAtTime(vol, now);
        gain.gain.linearRampToValueAtTime(0.001, now + dur + 0.02);

        osc.start(now);
        osc.stop(now + dur + 0.02);
      } catch (_) { /* audio is non-critical */ }
    }

    // ═══════════════════════════════════════════
    //  Voice mode
    // ═══════════════════════════════════════════
    function initRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return null;
      const r = new SR();
      r.lang = 'zh-CN';
      r.continuous = true;
      r.interimResults = false;

      r.onresult = (e) => {
        const transcript = e.results[e.results.length - 1][0].transcript.trim();

        // 撤销命令
        if (transcript === '撤销' || transcript === '撤回' || transcript === '后退' || transcript === '返回' || transcript === '取消') {
          undoStitch();
          triggerEdgeGlow(null);
          return;
        }

        const num = NUMBER_MAP[transcript];
        if (num == null) return;

        const palBtns = document.querySelectorAll('#bottom-bar .pal-btn[data-sid]');
        const target = palBtns[num - 1];
        if (!target) return;

        const sid = target.dataset.sid;
        pushStitch(sid);
        triggerEdgeGlow(sid);
      };

      r.onend = () => {
        if (voiceMode) r.start();
      };

      r.onerror = (e) => {
        if (!voiceMode) return; // 已被 catch 处理过，避免重复重置
        voiceMode = false;
        recognition = null;
        updateVoiceButton();
        playSound('exit');
        setVoicePulse(false);
        // 同步刷新 bottom-bar 移除 hint
        const proj = getProj(curProjId);
        if (proj) {
          const bar = document.getElementById('bottom-bar');
          if (bar) bar.innerHTML = renderDynamicPalette(proj) + renderFilterToggle() + renderBarRow();
        }
        if (e.error === 'not-allowed') {
          alert('麦克风权限被拒绝，请在浏览器设置中允许');
        }
      };

      return r;
    }

    function toggleVoiceMode() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        alert('您的浏览器不支持语音识别，请使用 Chrome 或 Safari');
        return;
      }

      voiceMode = !voiceMode;

      if (voiceMode) {
        recognition = initRecognition();
        try {
          recognition.start();
        } catch (err) {
          voiceMode = false;
          recognition = null;
          showToast('麦克风启动失败，请检查权限');
          setVoicePulse(false);
          updateVoiceButton();
          return;
        }
        playSound('enter');
        setVoicePulse(true);
      } else {
        if (recognition) {
          recognition.onend = null;
          try { recognition.stop(); } catch (_) { /* ignore */ }
          recognition = null;
        }
        playSound('exit');
        setVoicePulse(false);
      }

      // 语音模式切换时需要重渲 palette（按钮显示内容会变）
      const proj = getProj(curProjId);
      if (proj) {
        const bar = document.getElementById('bottom-bar');
        bar.innerHTML = renderDynamicPalette(proj) + renderFilterToggle() + renderBarRow();
      }
      updateVoiceButton();
    }

    function setVoicePulse(active) {
      const el = document.getElementById('voice-pulse');
      if (!el) return;
      if (active) {
        el.style.opacity = '0.3';
        el.classList.add('active');
      } else {
        el.classList.remove('active');
        el.style.opacity = '0';
      }
    }

    function updateVoiceButton() {
      const btn = document.getElementById('voice-mode-btn');
      if (!btn) return;
      if (voiceMode) {
        btn.textContent = '🎙 语音中';
        btn.style.background = '#EF4444';
        btn.style.color = '#fff';
        btn.style.borderColor = '#EF4444';
      } else {
        btn.textContent = '🎙 语音';
        btn.style.background = '';
        btn.style.color = '';
        btn.style.borderColor = '';
      }
      btn.style.animation = voiceMode ? 'btn-pulse 1.8s ease-in-out infinite' : '';
    }

    function triggerEdgeGlow(sid) {
      const color = sid ? getProjColor(sid, getProj(curProjId)) : '#9E8A74';
      const el = document.getElementById('edge-glow');
      if (!el) return;

      el.style.boxShadow = `inset 0 0 0 10px ${color}`;
      el.style.opacity = '1';

      clearTimeout(flowState.glowTimer);
      flowState.glowTimer = setTimeout(() => {
        el.style.transition = 'opacity 0.35s ease-out';
        el.style.opacity = '0';
        setTimeout(() => {
          el.style.transition = 'opacity 0.08s ease-in';
        }, 400);
      }, 120);
    }

    // ═══════════════════════════════════════════
    //  Settings
    // ═══════════════════════════════════════════
    function openSettings() {
      const theme = data.settings.theme || "macaron";
      const voiceOn = data.settings.voiceEnabled;
      const totalProjs = data.projects.length;
      const totalNeedles = data.projects.reduce((sum, p) =>
        sum + (p.parts || []).reduce((s, pt) =>
          s + (pt.rounds || []).reduce((ss, r) => ss + (r.seq?.length || 0), 0), 0), 0);

      const themes = [
        { key: "macaron", name: "马卡龙", dots: ["#7DD3FC", "#F9A8D4", "#2bf14f", "#f3da77"] },
        { key: "ocean",   name: "深海",   dots: ["#5BC0DE", "#48DBFB", "#FF9FF3", "#6C5CE7"] },
        { key: "forest",  name: "森林",   dots: ["#55E6C1", "#26DE81", "#FD79A8", "#A3CB38"] },
        { key: "minimal", name: "简约",   dots: ["#636E72", "#95A5A6", "#2ED573", "#FF6B81"] }
      ];

      let html = `<div class="sheet-handle"></div>
  <div class="sheet-title">⚙️ 设置</div>

  <div class="sheet-section">外观</div>
  <div class="settings-theme-grid">`;
      themes.forEach(t => {
        const active = theme === t.key ? " active" : "";
        const dotHtml = t.dots.map(c => `<span class="settings-theme-dot" style="background:${c}"></span>`).join("");
        html += `<div class="settings-theme-item${active}" onclick="changeTheme('${t.key}')">
    <div class="settings-theme-dots">${dotHtml}</div>
    <div class="settings-theme-name">${t.name}</div>
  </div>`;
      });
      html += `</div>`;

      html += `
  <div class="sheet-section">语音</div>
  <div class="settings-item" onclick="toggleVoiceDefault()">
    <div>
      <div class="settings-item-label">进入项目默认开启语音</div>
    </div>
    <span class="settings-toggle${voiceOn ? ' on' : ''}" id="settings-voice-toggle"><span class="settings-toggle-knob"></span></span>
  </div>`;

      html += `
  <div class="sheet-section">数据管理</div>
  <div class="settings-stat">当前 ${totalProjs} 个项目 · 累计 ${totalNeedles} 针</div>
  <div class="settings-btn-row">
    <button class="settings-btn settings-btn-secondary" onclick="exportData()">📤 导出备份</button>
    <label class="settings-btn settings-btn-secondary" style="display:block;text-align:center">
      📥 导入备份
      <input type="file" accept="application/json,.json" style="display:none" onchange="importData(this)">
    </label>
    <button class="settings-btn settings-btn-danger" onclick="clearAllData()">🗑 清空所有数据</button>
  </div>`;

      html += `
  <div class="sheet-section">安装</div>
  <div class="settings-btn-row">
    <button class="settings-btn settings-btn-primary" onclick="showPwaTutorial()">📲 安装到主屏幕</button>
  </div>`;

      html += `<button class="sheet-cancel" onclick="closeSheet()">关闭</button>`;

      document.getElementById("sheet").innerHTML = html;
      document.getElementById("sheet").classList.add("show");
      document.getElementById("overlay").classList.add("show");
    }

    function changeTheme(themeKey) {
      data.settings.theme = themeKey;
      saveData();
      // 更新 sheet 中的选中态
      document.querySelectorAll('.settings-theme-item').forEach(el => el.classList.remove('active'));
      const idx = { macaron: 0, ocean: 1, forest: 2, minimal: 3 }[themeKey];
      const items = document.querySelectorAll('.settings-theme-item');
      if (items[idx]) items[idx].classList.add('active');
      // 如果在项目页，只刷新底部调色板
      if (curProjId) {
        const proj = getProj(curProjId);
        if (proj) {
          const bar = document.getElementById("bottom-bar");
          if (bar) {
            let bhtml = renderDynamicPalette(proj);
            bhtml += renderFilterToggle();
            bhtml += renderBarRow();
            bar.innerHTML = bhtml;
            updateVoiceButton();
          }
        }
      }
    }

    function toggleVoiceDefault() {
      data.settings.voiceEnabled = !data.settings.voiceEnabled;
      saveData();
      const el = document.getElementById('settings-voice-toggle');
      if (el) el.classList.toggle('on');
    }

    function clearAllData() {
      showConfirmDialog("确定要清空所有数据吗？此操作不可恢复。", (ok) => {
        if (!ok) return;
        data.projects = [];
        saveData();
        if (curProjId) {
          goHome();
        } else {
          renderHome();
        }
        showToast("所有数据已清空");
      });
    }

    // ═══════════════════════════════════════════
    //  暴露全局函数（供 HTML onclick 使用）
    // ═══════════════════════════════════════════
    const _globals = {
      goHome, openProject, exportPDF, exportData, exportSingleProject, importData,
      showNewProjectDialog, showConfirmDialog, confirmDialog, closeDialog, deleteProject,
      addRound, toggleRound, deleteRound, undoDeleteRound, setActiveRound,
      pushStitch, undoStitch, stitchTap,
      changeStitch, deleteStitch, startInsert, doInsert,
      closeSheet, openPatternPasteSheet,
      handleParsePattern, handleOCR, removeParsedItem, confirmImport,
      renameProject,
      openStitchSetup, toggleSetupStitch, saveProjectStitches, closeSetupSheet,
      showEntryChoiceSheet, startImportFlow, startManualFlow, dismissEntryChoice,
      toggleSelectAllInSetup, startImportFromSetup, cancelPasteSheet,
      toggleFilterByRound,
      openStitchCustomize, saveStitchCustomize, resetStitchCustomize, backToSetupGrid,
      openNewStitchForm, saveNewStitch, deleteCustomStitch,
      addPart, switchPart, renamePart, deletePart,
      startEditPartName, partNameBlur, getEditingPartId,
      toggleProjMenu, archiveProject, showArchiveSuccessSheet, handlePwaHintOptOut, showPwaTutorial, unarchiveProject,
      toggleVoiceMode, updateVoiceButton,
      openSettings, changeTheme, toggleVoiceDefault, clearAllData,
      switchTab, renderSettings, updateTabNav,
      editExpectedCount,
      pickCover, setProjectCover, removeProjectCover
    };
    Object.entries(_globals).forEach(([k, v]) => { window[k] = v; });

    // 点击空白处关闭项目菜单
    document.addEventListener('click', (e) => {
      if (flowState.projMenuId === null) return;
      const menu = document.getElementById(`proj-menu-${flowState.projMenuId}`);
      if (menu && menu.contains(e.target)) return;
      if (e.target.closest('.proj-del')) return;
      flowState.projMenuId = null;
      if (menu) menu.classList.remove('show');
    });

    document.getElementById("tab-nav").style.display = "flex";
    loadData();
    renderHome();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch((err) => {
        console.warn('SW 注册失败:', err);
      });
    }
  </script>
</body>

</html>
