<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
  <title>钩织计数本</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#C07A45">
  <meta name="version" content="1.55">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Header -->
  <header class="nav-bar" id="nav-bar">
    <button class="nav-back" id="nav-back" onclick="goHome()">
      <span class="nav-back-arrow">‹</span>
      <span class="nav-back-label">返回</span>
    </button>
    <span class="nav-small-title" id="nav-small-title"></span>
    <div class="nav-actions" id="nav-actions"></div>
  </header>

  <!-- Main screen -->
  <div id="screen">
    <div class="large-title-wrap" id="large-title-wrap">
      <h1 class="large-title-text" id="large-title-text"></h1>
      <p class="large-title-sub" id="large-title-sub"></p>
    </div>

  <!-- Bottom palette -->
  <div class="bottom-bar" id="bottom-bar" style="display:none"></div>

  <!-- Tab Navigation -->
  <div id="tab-nav">
    <button class="tab-btn active" data-tab="projects" onclick="switchTab('projects')">
      <span class="tab-icon">🧶</span>
      <span class="tab-label">项目</span>
    </button>
    <button class="tab-btn" data-tab="settings" onclick="switchTab('settings')">
      <span class="tab-icon">⚙️</span>
      <span class="tab-label">设置</span>
    </button>
  </div>

  <!-- Overlay + action sheet -->
  <div class="overlay" id="overlay" onclick="closeSheet()"></div>
  <div class="sheet" id="sheet"></div>

  <!-- Global loading mask -->
  <div class="loading-mask" id="loading-mask">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loading-text">正在加载...</div>
  </div>

  <!-- New project dialog -->
  <div class="dialog" id="dialog">
    <div class="dialog-box">
      <div class="dialog-title" id="dlg-title">新建项目</div>
      <p class="dialog-msg" id="dlg-msg" style="display:none"></p>
      <input class="dialog-input" id="dlg-input" placeholder="项目名称，例如：粉色帽子" maxlength="30">
      <div class="dialog-row">
        <button class="dialog-btn" onclick="closeDialog()">取消</button>
        <button class="dialog-btn ok" onclick="confirmDialog()">确定</button>
      </div>
    </div>
  </div>

  <!-- Voice edge glow overlay -->
  <div id="edge-glow" style="
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0;
    border-radius: 0;
    transition: opacity 0.08s ease-in;
    box-shadow: inset 0 0 0 8px transparent;
  "></div>

  <!-- Voice breathing indicator -->
  <div id="voice-pulse" style="
    position: fixed;
    right: 16px;
    bottom: calc(var(--bottom-bar-h, 160px) + 16px);
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #EF4444;
    opacity: 0;
    pointer-events: none;
    z-index: 9999;
    transition: opacity 0.3s;
    box-shadow: 0 0 0 4px rgba(239,68,68,0.2);
  "></div>

  <script type="module" src="./js/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then((reg) => {
        // 检测新版本并提示刷新
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              console.log('[SW] 新版本已安装，请刷新页面');
              if (window.showToast) {
                showToast('新版本已就绪，刷新后生效', { label: '刷新', onClick: () => location.reload() }, 8000);
              }
            }
          });
        });
      }).catch((err) => {
        console.warn('SW 注册失败:', err);
      });

      navigator.serviceWorker.addEventListener('message', e => {
        if (e.data?.type === 'SW_UPDATED') {
          showUpdateToast();
        }
      });
    }
  </script>
  <script>
    function showUpdateToast() {
      if (document.getElementById('update-toast')) return;

      const el = document.createElement('div');
      el.id = 'update-toast';
      el.style.cssText = `
        position: fixed;
        top: 0; left: 0; right: 0;
        background: var(--accent);
        color: #fff;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 14px;
        font-weight: 600;
        z-index: 9999;
        safe-area: env(safe-area-inset-top);
      `;
      el.innerHTML = `
        <span>✨ 发现新版本</span>
        <button onclick="location.reload()" style="
          background: #fff;
          color: var(--accent);
          border: none;
          border-radius: 6px;
          padding: 4px 12px;
          font-size: 13px;
          font-weight: 700;
          cursor: pointer;
          font-family: inherit;
        ">立即刷新</button>
      `;
      document.body.prepend(el);
    }

  </script>
</body>

</html>
